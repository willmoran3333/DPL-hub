name: Build + deploy to GitHub Pages

# Triggers:
#   - On push to main: build + deploy
#   - Manual: from Actions tab → "Run workflow"
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Refresh data from Sleeper (idempotent)
        run: python3 ingest.py

      - name: Build site
        run: python3 build_site.py

      - name: Add a .nojekyll so GitHub Pages serves all files raw
        run: touch dist/.nojekyll

      - name: Write CNAME for custom domain
        run: echo "dallaspremierleague.org" > dist/CNAME

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
