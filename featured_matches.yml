  # Matchup 5 of GW33 — title implications
  - home_roster_id: 6           # bjennings28  · 17–15 · 5th
    away_roster_id: 10          # erozier      · 21–11 · 1st
    headline: "Title Lock or Door Cracks Open"
    body: >
      erozier comes in at 21–11 with a 380-point lead on the field's points-for
      column — the regular-season title is his to lose, and a win here all but
      clinches the #1 seed with only four weeks left to play. But bjennings'
      side has been steady all year and is fresh off a string of mid-ceiling
      games. If Smith-Rowe v Wade hit a 95-plus week, Haalandcaust's
      wire-to-wire coronation stalls and Noahvillasana17 — sitting 20–12 and
      one back — suddenly has life.

  # Matchup 3 of GW33 — biggest offensive mismatch of the season
  - home_roster_id: 5           # brendog2814  · 18–14 · 4th · 2,902 PF
    away_roster_id: 11          # jacklynch213 · 13–19 · 12th · 2,082 PF
    headline: "Highest Offense Meets Lowest"
    body: >
      brendog2814 has scored 2,902 points this season — second only to
      erozier and 820 clear of LPLLC, who occupy the cellar with the
      league's lowest offense by nearly 400 points. It is, almost literally,
      a full season's worth of scoring difference. On paper a blowout, but
      brendog can't afford to sleepwalk: a win jumps his team into the
      #3-seed conversation with JordiCarb (19–13), a loss drops him closer
      to the playoff bubble than the top four.
