headline: "erozier wins the 2025/26 DPL title"
subheadline: "Wire-to-wire champion finishes 25-13 with the league's best offense"
body: >
  After 38 weeks, the DPL crown belongs to erozier. He took the top of the
  table early, defended it through every challenger that emerged, and
  finished three games clear of JordiCarb in second place. The road wasn't
  perfect — bjennings28 stunned him in GW33, and Flabiano9 spoiled the
  victory lap with a 52.5 to 31.75 finale upset in GW38 — but the cushion
  he built across the spring made the math academic for weeks. He led the
  league in points-for (3,492.50) and finished with the largest scoring
  margin of any manager. The 2025/26 DPL champion.

